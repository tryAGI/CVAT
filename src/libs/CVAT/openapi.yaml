      "post": {
        "operationId": "tasks_create_data",
        "description": "Allows to upload data (images, video, etc.) to a task.\nSupports the TUS open file uploading protocol (https://tus.io/).\n\nSupports the following protocols:\n\n1. A single Data request\n\nand\n\n2.1. An Upload-Start request\n2.2.a. Regular TUS protocol requests (Upload-Length + Chunks)\n2.2.b. Upload-Multiple requests\n2.3. An Upload-Finish request\n\nRequests:\n- Data - POST, no extra headers or 'Upload-Start' + 'Upload-Finish' headers.\n  Contains data in the body.\n- Upload-Start - POST, has an 'Upload-Start' header. No body is expected.\n- Upload-Length - POST, has an 'Upload-Length' header (see the TUS specification)\n- Chunk - HEAD/PATCH (see the TUS specification). Sent to /data/<file id> endpoints.\n- Upload-Finish - POST, has an 'Upload-Finish' header. Can contain data in the body.\n- Upload-Multiple - POST, has an 'Upload-Multiple' header. Contains data in the body.\n\nThe 'Upload-Finish' request allows to specify the uploaded files should be ordered.\nThis may be needed if the files can be sent unordered. To state that the input files\nare sent ordered, pass an empty list of files in the 'upload_file_order' field.\nIf the files are sent unordered, the ordered file list is expected\nin the 'upload_file_order' field. It must be a list of string file paths,\nrelative to the dataset root.\n\nExample:\nfiles = [\n    \"cats/cat_1.jpg\",\n    \"dogs/dog2.jpg\",\n    \"image_3.png\",\n    ...\n]\n\nIndependently of the file declaration field used\n('client_files', 'server_files', etc.), when the 'predefined'\nsorting method is selected, the uploaded files will be ordered according\nto the '.jsonl' manifest file, if it is found in the list of files.\nFor archives (e.g. '.zip'), a manifest file ('*.jsonl') is required when using\nthe 'predefined' file ordering. Such file must be provided next to the archive\nin the list of files. Read more about manifest files here:\nhttps://docs.cvat.ai/docs/manual/advanced/dataset_manifest/\n\nAfter all data is sent, the operation status can be retrieved via\nthe `GET /api/requests/<rq_id>`, where **rq_id** is request ID returned for this request.\n\nOnce data is attached to a task, it cannot be detached or replaced.\n",
        "summary": "Attach data to a task",
        "parameters": [
          {
            "in": "header",
            "name": "Upload-Finish",
            "schema": {
              "type": "boolean"
            },
            "description": "Finishes data upload. Can be combined with Upload-Start header to create task data with one request"
          },
          {
            "in": "header",
            "name": "Upload-Multiple",
            "schema": {
              "type": "boolean"
            },
            "description": "Indicates that data with this request are single or multiple files that should be attached to a task"
          },
          {
            "in": "header",
            "name": "Upload-Start",
            "schema": {
              "type": "boolean"
            },
            "description": "Initializes data upload. Optionally, can include upload metadata in the request body."
          },
          {
            "in": "path",
            "name": "id",
            "schema": {
              "type": "integer"
            },
            "description": "A unique integer value identifying this task.",
            "required": true
          }
        ],
        "tags": [
          "tasks"
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/DataRequest"
              }
            },
            "multipart/form-data": {
              "schema": {
                "$ref": "#/components/schemas/DataRequest"
              }
            }
          }
        },
        "security": [
          {
            "tokenAuth": []
          },
          {
            "accessTokenAuth": []
          },
          {
            "sessionAuth": [],
            "csrfAuth": [],
            "csrfHeaderAuth": []
          },
          {
            "basicAuth": []
          }
        ],
        "responses": {
          "202": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/DataResponse"
                }
              }
            },
            "description": "Request to attach a data to a task has been accepted"
          }
        }
      }
    },
