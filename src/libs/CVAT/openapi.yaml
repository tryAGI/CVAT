    "/api/auth/access_tokens": {
      "get": {
        "operationId": "auth_list_access_tokens",
        "summary": "List tokens",
        "parameters": [
          {
            "name": "filter",
            "required": false,
            "in": "query",
            "description": "\nJSON Logic filter. This filter can be used to perform complex filtering by grouping rules.\n\nFor example, using such a filter you can get all resources created by you:\n\n    - {\"and\":[{\"==\":[{\"var\":\"owner\"},\"<user>\"]}]}\n\nDetails about the syntax used can be found at the link: https://jsonlogic.com/\n\n Available filter_fields: ['name', 'id', 'created_date', 'updated_date', 'expiry_date', 'last_used_date', 'read_only'].",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "name",
            "in": "query",
            "description": "A simple equality filter for the name field",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "page",
            "required": false,
            "in": "query",
            "description": "A page number within the paginated result set.",
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "page_size",
            "required": false,
            "in": "query",
            "description": "Number of results to return per page.",
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "search",
            "required": false,
            "in": "query",
            "description": "A search term. Available search_fields: ('name',)",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "sort",
            "required": false,
            "in": "query",
            "description": "Which field to use when ordering the results. Available ordering_fields: ['name', 'id', 'created_date', 'updated_date', 'expiry_date', 'last_used_date', 'read_only']",
            "schema": {
              "type": "string"
            }
          }
        ],
        "tags": [
          "auth"
        ],
        "security": [
          {
            "tokenAuth": []
          },
          {
            "accessTokenAuth": []
          },
          {
            "sessionAuth": [],
            "csrfAuth": [],
            "csrfHeaderAuth": []
          },
          {
            "basicAuth": []
          }
        ],
        "responses": {
          "200": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/PaginatedAccessTokenReadList"
                }
              }
            },
            "description": ""
          }
        }
      },
