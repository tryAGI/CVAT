    "/api/analytics/reports": {
      "get": {
        "operationId": "analytics_get_reports",
        "description": "Receive analytics report",
        "summary": "Get an analytics report",
        "parameters": [
          {
            "in": "query",
            "name": "end_date",
            "schema": {
              "type": "string",
              "format": "date-time"
            },
            "description": "UTC end date for events filtration. Default is the current time."
          },
          {
            "in": "query",
            "name": "job_id",
            "schema": {
              "type": "integer"
            },
            "description": "Specify job ID"
          },
          {
            "in": "query",
            "name": "project_id",
            "schema": {
              "type": "integer"
            },
            "description": "Specify project ID"
          },
          {
            "in": "query",
            "name": "start_date",
            "schema": {
              "type": "string",
              "format": "date-time"
            },
            "description": "UTC start date for events filtration. Default is the minimal time."
          },
          {
            "in": "query",
            "name": "task_id",
            "schema": {
              "type": "integer"
            },
            "description": "Specify task ID"
          }
        ],
        "tags": [
          "analytics"
        ],
        "security": [
          {
            "tokenAuth": []
          },
          {
            "accessTokenAuth": []
          },
          {
            "sessionAuth": [],
            "csrfAuth": [],
            "csrfHeaderAuth": []
          },
          {
            "basicAuth": []
          }
        ],
        "responses": {
          "200": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/AnalyticsReport"
                }
              }
            },
            "description": ""
          },
          "204": {
            "description": "Report not found"
          },
          "404": {
            "description": "Resource not found"
          }
        }
      },
      "post": {
        "operationId": "analytics_create_report",
        "summary": "Create an analytics report",
        "parameters": [
          {
            "in": "query",
            "name": "rq_id",
            "schema": {
              "type": "string"
            },
            "description": "The report creation request id. Can be specified to check the report\ncreation status.\n"
          }
        ],
        "tags": [
          "analytics"
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateAnalyticsReportBodyRequest"
              }
            }
          }
        },
        "security": [
          {
            "tokenAuth": []
          },
          {
            "accessTokenAuth": []
          },
          {
            "sessionAuth": [],
            "csrfAuth": [],
            "csrfHeaderAuth": []
          },
          {
            "basicAuth": []
          }
        ],
        "responses": {
          "202": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/RqId"
                }
              }
            },
            "description": "A analytics report request has been enqueued, the request id is returned.\nThe request status can be checked by using common requests API: `GET /api/requests/<rq_id>`\n"
          },
          "400": {
            "description": "Invalid or failed request, check the response data for details"
          }
        }
      }
    },
