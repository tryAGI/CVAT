      "PatchedQualitySettingsRequest": {
        "type": "object",
        "properties": {
          "job_filter": {
            "type": "string",
            "description": "A JSON-based logic expression used to filter jobs for quality validation.\nThe filter supports various terms to specify conditions on job: ['assignee', 'id', 'stage', 'state', 'task_id', 'task_name', 'type']\n",
            "maxLength": 1024
          },
          "inherit": {
            "type": "boolean",
            "description": "Allow using project settings when computing task quality.\nOnly applicable to task quality settings inside projects\n"
          },
          "target_metric": {
            "allOf": [
              {
                "$ref": "#/components/schemas/QualityTargetMetric"
              }
            ],
            "description": "The primary metric used for quality estimation\n\n* `accuracy` - ACCURACY\n* `precision` - PRECISION\n* `recall` - RECALL"
          },
          "target_metric_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "description": "Defines the minimal quality requirements in terms of the selected target metric.\n"
          },
          "max_validations_per_job": {
            "type": "integer",
            "maximum": 2147483647,
            "minimum": 0,
            "description": "The maximum number of job validation attempts for the job assignee.\nThe job can be automatically accepted if the job quality is above the required\nthreshold, defined by the target threshold parameter.\n"
          },
          "iou_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.4,
            "description": "Used for distinction between matched / unmatched shapes"
          },
          "oks_sigma": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.09,
            "description": "Like IoU threshold, but for points.\nThe percent of the bbox side, used as the radius of the circle around the GT point,\nwhere the checked point is expected to be. For boxes with different width and\nheight, the \"side\" is computed as a geometric mean of the width and height.\nRead more: https://cocodataset.org/#keypoints-eval\n"
          },
          "point_size_base": {
            "allOf": [
              {
                "$ref": "#/components/schemas/QualityPointSizeBase"
              }
            ],
            "default": "group_bbox_size",
            "description": "When comparing point annotations (including both separate points and point groups),\nthe OKS sigma parameter defines matching area for each GT point based to the\nobject size. The point size base parameter allows to configure how to determine\nthe object size.\nIf image_size, the image size is used. Useful if each point\nannotation represents a separate object or boxes grouped with points do not\nrepresent object boundaries.\nIf group_bbox_size, the object size is based on\nthe point group bbox size. Useful if each point group represents an object\nor there is a bbox grouped with points, representing the object size.\n\n\n* `image_size` - IMAGE_SIZE\n* `group_bbox_size` - GROUP_BBOX_SIZE"
          },
          "line_thickness": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.01,
            "description": "Thickness of polylines, relatively to the (image area) ^ 0.5.\nThe distance to the boundary around the GT line,\ninside of which the checked line points should be\n"
          },
          "low_overlap_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.8,
            "description": "Used for distinction between strong / weak (low_overlap) matches\n"
          },
          "compare_line_orientation": {
            "type": "boolean",
            "default": true,
            "description": "Enables or disables polyline orientation comparison"
          },
          "line_orientation_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.1,
            "description": "The minimal gain in the GT IoU between the given and reversed line directions\nto consider the line inverted.\nOnly used when the 'compare_line_orientation' parameter is true\n"
          },
          "compare_groups": {
            "type": "boolean",
            "default": true,
            "description": "Enables or disables annotation group checks"
          },
          "group_match_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.5,
            "description": "Minimal IoU for groups to be considered matching.\nOnly used when the 'compare_groups' parameter is true\n"
          },
          "check_covered_annotations": {
            "type": "boolean",
            "default": true,
            "description": "Check for partially-covered annotations, useful in segmentation tasks\n"
          },
          "object_visibility_threshold": {
            "type": "number",
            "format": "double",
            "maximum": 1,
            "minimum": 0,
            "default": 0.05,
            "description": "Minimal visible area percent of the spatial annotations (polygons, masks)\nfor reporting covered annotations.\nOnly used when the 'object_visibility_threshold' parameter is true\n"
          },
          "panoptic_comparison": {
            "type": "boolean",
            "default": true,
            "description": "Use only the visible part of the masks and polygons in comparisons\n"
          },
          "compare_attributes": {
            "type": "boolean",
            "default": true,
            "description": "Enables or disables annotation attribute comparison"
          },
          "empty_is_annotated": {
            "type": "boolean",
            "default": false,
            "description": "Consider empty frames annotated as \"empty\". This affects target metrics like\naccuracy in cases there are no annotations. If disabled, frames without annotations\nare counted as not matching (accuracy is 0). If enabled, accuracy will be 1 instead.\nThis will also add virtual annotations to empty frames in the comparison results.\n"
          }
        }
      },
