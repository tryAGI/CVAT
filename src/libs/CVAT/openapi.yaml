      "post": {
        "operationId": "quality_create_validation",
        "description": "The endpoint can be used this way:\n\n    request_data = {\"job_id\": 42}\n    response = post(body=request_data)\n    if response.status == 200:\n        return response.data[\"status\"] # likely, \"disabled\"\n\n    rq_id = response.data[\"rq_id\"]\n    while True:\n        response = get(f\"/api/requests/{rq_id}\")\n        background_request = json.loads(response.data)\n        if background_request[\"status\"] == \"finished\":\n            return background_request\n        elif background_request[\"status\"] == \"failed\":\n            raise Exception(background_request[\"message\"])\n\nOnly the last validation request to a job is considered valid. If a new request arrives\nbefore the previous one is completed, the previous one is considered canceled.\nThe attempts counter will be increased regardless of the results being collected.\n",
        "summary": "Create a job validation request",
        "tags": [
          "quality"
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/JobValidationCreateRequest"
              },
              "examples": {
                "RequestAJobValidation": {
                  "value": {
                    "job_id": 42
                  },
                  "summary": "Request a job validation"
                },
                "RequestAJobValidationWithATimeout": {
                  "value": {
                    "job_id": 42,
                    "timeout": 30
                  },
                  "summary": "Request a job validation with a timeout",
                  "description": "Here we allow no more than 30 seconds for processing.\nIt's useful if you want to provide a responsive UI,\nwhich doesn't pollute server with unnecessary requests.\nThe \"timeout\" parameter will automatically cancel the request,\nif it's not processed in the specified time period.\n"
                }
              }
            }
          }
        },
        "security": [
          {
            "tokenAuth": []
          },
          {
            "accessTokenAuth": []
          },
          {
            "sessionAuth": [],
            "csrfAuth": [],
            "csrfHeaderAuth": []
          },
          {
            "basicAuth": []
          }
        ],
        "responses": {
          "200": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/JobValidation"
                }
              }
            },
            "description": "A job validation request has been processed successfully\nwithout creating an async task.\nTypically this means that job validation is disabled for the job.\n"
          },
          "202": {
            "content": {
              "application/vnd.cvat+json": {
                "schema": {
                  "$ref": "#/components/schemas/RqId"
                }
              }
            },
            "description": "A job validation request has been enqueued, the request id is returned.\nThe request status can be checked by using common requests API: `GET /api/requests/<rq_id>`.\n"
          },
          "400": {
            "description": "Invalid or failed request, check the response data for details"
          }
        }
      }
    },
